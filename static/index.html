<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek MNIST Recognizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        canvas {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: crosshair;
            background-color: white;
            touch-action: none;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #clearBtn { background-color: #fce4e4; color: #d9534f; }
        #clearBtn:hover { background-color: #f8d0d0; }
        #predictBtn { background-color: #e4f0fc; color: #0275d8; }
        #predictBtn:hover { background-color: #d0e6f8; }
        
        .results {
            margin-top: 20px;
            text-align: left;
        }
        .result-bar {
            background: #eee;
            border-radius: 4px;
            margin-bottom: 8px;
            position: relative;
            height: 24px;
        }
        .fill {
            background: #5cb85c;
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .label {
            position: absolute;
            top: 2px;
            left: 10px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Draw a Digit</h2>
        <canvas id="sketchpad" width="280" height="280"></canvas>
        
        <div class="controls">
            <button id="clearBtn">Clear</button>
            <button id="predictBtn">Predict</button>
        </div>

        <div class="results" id="resultsDiv">
            <p style="text-align:center; color:#888;">Predictions will appear here</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sketchpad');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // fill canvas with white initially
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.lineWidth = 20; 
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = 'black';

        // drawing logic
        function startDrawing(e) {
            isDrawing = true;
            draw(e);
        }

        function stopDrawing() {
            isDrawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!isDrawing) return;
            
            // mouse and touch events
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
        
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        document.getElementById('clearBtn').addEventListener('click', () => {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            document.getElementById('resultsDiv').innerHTML = '<p style="text-align:center; color:#888;">Predictions will appear here</p>';
        });

        // predict logic
        document.getElementById('predictBtn').addEventListener('click', async () => {
            const dataURL = canvas.toDataURL('image/png');
            
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataURL })
            });
            
            const data = await response.json();
            const resultsDiv = document.getElementById('resultsDiv');
            resultsDiv.innerHTML = '<h3>Top Guesses:</h3>';
            
            data.predictions.forEach(pred => {
                resultsDiv.innerHTML += `
                    <div class="result-bar">
                        <div class="fill" style="width: ${pred.prob}%;"></div>
                        <div class="label">Digit ${pred.class}: ${pred.prob}%</div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
